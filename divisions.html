<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 Jamboree Division Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Attendance Summary</p>
        <h1>Division Summary</h1>
        <p class="hero-copy">
          Live totals for checked in, still expected, and roster size in each division.
        </p>
        <div class="hero-actions">
          <a class="hero-link" href="./index.html">Back to check-in</a>
          <a class="hero-link" href="./shirts.html">Shirt handouts</a>
        </div>
      </header>

      <main class="layout summary-layout">
        <section class="panel summary-panel">
          <div id="syncBanner" class="sync-banner" aria-live="polite"></div>

          <div class="results-header">
            <div>
              <p class="field-label">Divisions</p>
              <p id="summaryDescription" class="results-summary">Loading division totals…</p>
            </div>
          </div>

          <section id="divisionSummary" class="summary-grid" aria-label="Division attendance summary"></section>
        </section>
      </main>
    </div>

    <template id="divisionSummaryTemplate">
      <article class="summary-card">
        <div class="summary-card-head">
          <h2 class="summary-title"></h2>
        </div>
        <section class="stats stats-inline" aria-label="Division totals">
          <article class="stat-card accent-card">
            <span class="stat-label">Checked in</span>
            <strong class="stat-value division-present-count">0</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Still expected</span>
            <strong class="stat-value division-remaining-count">0</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Roster size</span>
            <strong class="stat-value division-total-count">0</strong>
          </article>
        </section>
      </article>
    </template>

    <script src="./firebase-config.js"></script>
    <script type="module" src="./division-summary.js"></script>
  </body>
</html>
